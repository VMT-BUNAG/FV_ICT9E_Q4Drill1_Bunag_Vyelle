<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <h1>ELECTRICITY CONSUMPTION CLASSIFIED</h1>
    <!--comment-->
    <input type="text" id="cnsmp" class="form-control" placeholder="type here...">

    <button class="btn btn-info" onclick="checkConsumption()">Check</button>

    <script>
        function checkConsumption(){
            var consumption = document.getElementById("cnsmp").value;
            var cat1 = "Lifeline Consumer";
            var cat2 = "Low Consumption";
            var cat3 = "Average Consumption";
            var cat4 = "High Consumption";
            var cat5 = "Very High Consumption";

        if(isNaN(consumption) || consumption < 0){
            alert("Please input a valid number.");
        }
        else if(consumption <=100){
            alert("You are a " + cat1 + ". You are discounted in electricity rates.");
        }
        else if(consumption <=101){
            alert("This is a " + cat2 + ". You have normal residential rates.");
        }
        else if(consumption <= 201){
            alert("This is an " + cat3 + ". You have typical electricity usage.");
        }
        else if(consumption <= 301){
            alert("This is a " + cat4 + ". You have significantly higher electricity usage.");
        }
        else if(consumption <= 501){
            alert("This is a " + cat5 + ". You have heavy electricity users.");
        }
        else{
            alert("Please enter a valid usage level.");
        }
    }
    </script>

</body>
</html>

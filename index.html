<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #fde2e4;
            font-family: Arial, sans-serif;
        }

        .page-center {
            width: 100%;
            height: 100vh;
            text-align: center;
            padding-top: 100px;
        }

        .yes {
            background-color: #fff;
            border: 4px dashed #f4a7b9;
            border-radius: 30px;
            padding: 40px;
            width: 600px;
            margin: auto;
        }

        .title {
            background-color: #f9c5d1;
            border-radius: 18px;
            font-size: 32px;
            font-weight: bold;
            padding: 10px;
        }

        .btn-pink {
            background-color: #f4a7b9;
            border: none;
            color: white;
            border-radius: 30px;
            padding: 10px 28px;
            font-size: 18px;
        }

    </style>
    
</head>
<body>
    <div style="background-color:#ffe6f2; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="yes">
    <h1 class="title">ELECTRICITY CONSUMPTION CLASSIFIED</h1>
    <!--comment-->
    <input type="text" id="cnsmp" class="form-control" placeholder="type here...">

    <button class="btn-pink mt-3" onclick="checkConsumption()">Check</button>
        
    <script>
        function checkConsumption(){
            var consumption = document.getElementById("cnsmp").value;
            var cat1 = "Lifeline Consumer";
            var cat2 = "Low Consumption";
            var cat3 = "Average Consumption";
            var cat4 = "High Consumption";
            var cat5 = "Very High Consumption";

        if(isNaN(consumption) || consumption < 0){
            alert("Please input a valid number.");
        }
        else if(consumption <=100){
            alert("You are a " + cat1 + ". You are discounted in electricity rates.");
        }
        else if(consumption <=101){
            alert("This is a " + cat2 + ". You have normal residential rates.");
        }
        else if(consumption <= 201){
            alert("This is an " + cat3 + ". You have typical electricity usage.");
        }
        else if(consumption <= 301){
            alert("This is a " + cat4 + ". You have significantly higher electricity usage.");
        }
        else if(consumption <= 501){
            alert("This is a " + cat5 + ". You have heavy electricity users.");
        }
        else{
            alert("Please enter a valid usage level.");
        }
    }
    </script>

</body>
</html>
